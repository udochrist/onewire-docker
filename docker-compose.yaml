services:
  onewire:

    build:
      context: .
      dockerfile: ./Dockerfile

    image: ghcr.io/udochrist/onewire-docker:latest
    container_name: onewire
    restart: unless-stopped
        
    cap_add:
      - SYS_ADMIN
      
    volumes:
      - ./config:/config

    environment:
      START_OWHTTPD: "${START_OWHTTPD:-false}"
      START_OWFS: "${START_OWFS:-false}"
    
    devices:
      - /dev/fuse:/dev/fuse:rwm

    security_opt:
      - apparmor:unconfined

    ports:
      - 2120:2120 # FTP
      - 2121:2121 # HTTP
      - 4304:4304 # SERVER
